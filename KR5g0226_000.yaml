body:
  text: 七元璇璣召魔品經元始說度鄧都經七元璇璣召魔品經七真告五老上皇曰天有三氣主無上三天也第一天名清微寶天第二天名禹餘元天第三天名大赤中天上昊天下至中天人間謂之三清真氣凝結皆主治三洞治化人間攝伏百惡生人求福皆至此也列二十八宿有中皇九道神氣下布人身養育生民上為九星真君皆好長生有不死之道在此極之上名曰九道皆置九宫列八卦皆有真符九道令後學佩授大驅鬼神翻天轉地攝伏惡魔上能助國扶難下有理救生民之法天尊以龍漢元年甲午之歲演君北帝降生道戮鬼滅精之法令天人修之故出三五步綱躡紀正法豁落七元真符元精神券謂之滅魔真券寶章傳于天師令生民無天亡之患獲長生妙源矣是時五老受命稽首請持神符奉經救世不敢宣泄當拔度群生令得無患離諸邪妄入我道源故列真符靈章九道傳告于今有道士專心一志入我此法為之祭酒治民普救一切衆生俱入妙道鬼神避走若有疾病之家來迎子當立道場然燈先作符九道安九宫八卦之上保宅遏魔其病自瘥萬鬼二神宅內魍魎奔馳千里善神加衛三官九府之官悉皆受禁誡元精流蔭當三十年度一人得之者萬法皆成不得妄泄下愚行尸王三之人禍殃九祖長役鬼官後學道士愼戒而奉行七真曰我昔觀三界之中悉為魔邪妖魅所亂心生凶惡不能入長生之妙源遊魂物外為鬼魔所中悲哉悲哉衆生悉迷亂於下鬼今故出靈官真符傳于後學道士斷截精魅考鬼治病佐天正氣謹按師法不犯書符鎮壓轉經行道拜奏章表我告今書符治病平等一心憐愍一切有心必當救濟三龍之後勤心勸化衆生受經奉法依師求道絶諸世榮專心一法奉對師如御前七真告諸天大魔及五帝大魔一切王等三九五七之後當助道士遊行國界治一切疾病收攝天下一切邪魔勿令犯害良民若有一切强精故魅犯觸吾禁令當付酆都治罪殺鬼生人佐助道士行化有靈感矣七真曰後學道士三界之中有幸我者天靈地聖三十六天所奉三官刻書福堂魔王所舉位登仙王三龍之後依科奉行三十年方傳一人如無當書一本藏諸名山為仙官所重地祇侍軒得道之時尅入金門也七元璇璣召魔品經
  hash: sha256:c02a1582c66d508b43dd02f2cc60d3e37fdadab64c5b62afbcc64772966dc729
